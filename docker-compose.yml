version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ../../litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]

  kairos-runtime:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: kairos-runtime
    env_file:
      - ../../.env
    depends_on:
      - litellm-proxy
      - ollama